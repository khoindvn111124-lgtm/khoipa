    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --app-blue: #00E5FF; /* Xanh Neon hiện đại */
            --app-purple: #7C4DFF; /* Tím Gaming */
            --app-gray: #9E9E9E;
            --app-bg: #0B0E14; /* Nền tối sâu */
            --app-card: #161B26; /* Nền card tối */
            --app-separator: rgba(255, 255, 255, 0.06);
            --safe-bottom: env(safe-area-inset-bottom, 16px);
        }
        
        * { 
            -webkit-tap-highlight-color: transparent; 
            box-sizing: border-box;
        }
        
        body {
            background: var(--app-bg);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            padding-bottom: calc(20px + var(--safe-bottom));
            margin: 0;
            overscroll-behavior: none;
            color: #E0E6ED;
        }

        /* ── Header Container ── */
        .sticky-header-container {
            position: sticky;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 9999;
            background: rgba(11, 14, 20, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--app-separator);
        }

        /* ── Header ── */
        .app-header {
            padding: 16px 16px 4px;
        }
        .app-header h1 {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin: 0;
            background: linear-gradient(135deg, #00E5FF, #7C4DFF);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .app-header .subtitle {
            font-size: 13px;
            color: var(--app-gray);
            margin-top: 2px;
        }

        /* ── Search Bar ── */
        .search-bar {
            margin: 10px 16px;
            position: relative;
        }
        .search-bar input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.05);
            font-size: 16px;
            color: #fff;
            outline: none;
            transition: all 0.25s ease;
        }
        .search-bar input:focus { 
            background: rgba(255, 255, 255, 0.08); 
            border-color: var(--app-blue);
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.15);
        }
        .search-bar .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 16px;
        }

        /* ── Category Filter Bar ── */
        .category-filter-bar {
            display: flex;
            overflow-x: auto;
            padding: 6px 16px 12px;
            gap: 8px;
            scrollbar-width: none;
            -ms-overflow-style: none;
            -webkit-overflow-scrolling: touch;
        }
        .category-filter-bar::after {
            content: '';
            flex: 0 0 16px;
        }
        .category-filter-bar::-webkit-scrollbar { display: none; }
        .category-filter-item {
            flex-shrink: 0;
            padding: 7px 15px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #A0AEC0;
            background: rgba(255, 255, 255, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            user-select: none;
            border: 1px solid rgba(255, 255, 255, 0.03);
            outline: none;
            touch-action: manipulation;
        }
        .category-filter-item.active {
            background: linear-gradient(135deg, var(--app-blue), var(--app-purple));
            color: #fff;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.2);
        }
        .category-filter-item:active { opacity: 0.8; }

        /* ── Quick Add Source Buttons ── */
        .quick-add-source {
            display: flex;
            gap: 8px;
            padding: 4px 16px 12px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .quick-add-source::-webkit-scrollbar { display: none; }
        .quick-add-btn {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 7px 13px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            color: #fff;
            border: none;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.1s ease, opacity 0.1s ease;
            flex-shrink: 0;
        }
        .quick-add-btn:hover { color: #fff; text-decoration: none; }
        .quick-add-btn:active { transform: scale(0.94); opacity: 0.85; }
        .quick-add-btn.esign { background: linear-gradient(135deg, #007AFF, #5856D6); }
        .quick-add-btn.ksign { background: linear-gradient(135deg, #FF9500, #FF6B00); }
        .quick-add-btn.gbox  { background: linear-gradient(135deg, #AF52DE, #BF5AF2); }
        .quick-add-btn.feather { background: linear-gradient(135deg, #34C759, #30D158); }
        .quick-add-btn i { font-size: 15px; }

        /* ── Bottom Tab Bar ── */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(22, 27, 38, 0.94);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 0.5px solid var(--app-separator);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 var(--safe-bottom);
            z-index: 100;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            padding: 4px 12px;
            cursor: pointer;
            font-size: 10px;
            color: var(--app-gray);
            transition: color 0.15s;
            min-width: 60px;
        }
        .tab-item.active { color: var(--app-blue); }
        .tab-item i { font-size: 22px; }
        .tab-item span { font-weight: 500; }

        /* ── Page Content ── */
        .page { display: none; }
        .page.active { display: block; }

        /* ── Section Title ── */
        .section-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
            padding: 8px 16px;
            margin: 16px 0 8px;
            color: #FFFFFF;
        }

        /* ── App List Item (Apple Style) ── */
        .app-list-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--app-card);
            border-bottom: 1px solid var(--app-separator);
            cursor: pointer;
            transition: all 0.2s ease;
            gap: 14px;
        }
        .app-list-item:hover { 
            background: rgba(255, 255, 255, 0.02); 
        }
        .app-list-item:active { 
            background: rgba(255, 255, 255, 0.04); 
        }
        
        .app-list-item .app-icon {
            width: 64px;
            height: 64px;
            border-radius: 15px;
            object-fit: cover;
            background: #1A202C;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }
        .app-list-item .app-info {
            flex: 1;
            min-width: 0;
        }
        .app-list-item .app-name {
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-list-item .app-dev {
            font-size: 13px;
            color: var(--app-gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .app-list-item .app-desc {
            font-size: 13px;
            color: #A0AEC0;
            margin-top: 3px;
            line-height: 1.4;
            word-break: break-word;
        }
        .app-list-item .app-meta {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
        }
        .app-list-item .app-badge {
            font-size: 11px;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.06);
            color: #CBD5E0;
            padding: 2px 8px;
            border-radius: 6px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .app-list-item .get-btn {
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1), rgba(124, 77, 255, 0.1));
            color: var(--app-blue);
            border: 1px solid rgba(0, 229, 255, 0.2);
            border-radius: 16px;
            padding: 6px 20px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
            box-shadow: 0 2px 8px rgba(0, 229, 255, 0.05);
        }
        .app-list-item .get-btn:hover { 
            background: linear-gradient(135deg, var(--app-blue), var(--app-purple));
            color: #fff; 
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(0, 229, 255, 0.25);
        }
        .app-list-item .get-btn:active { transform: scale(0.95); }

        /* ── Category Section ── */
        .category-section {
            margin-bottom: 8px;
        }
        .category-header {
            display: flex;
            align-items: center;
            padding: 16px 16px 8px;
            gap: 8px;
            position: sticky;
            top: 0;
            background: rgba(11, 14, 20, 0.9);
            z-index: 5;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--app-separator);
        }
        .category-icon {
            font-size: 22px;
        }
        .category-title {
            font-size: 20px;
            font-weight: 800;
            color: #FFFFFF;
            letter-spacing: -0.5px;
            flex: 1;
        }
        .category-count {
            font-size: 13px;
            font-weight: 600;
            color: var(--app-gray);
            background: rgba(255, 255, 255, 0.06);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .category-apps .app-list-item {
            padding-left: 16px;
            padding-right: 16px;
        }

        /* ── Repo List Item ── */
        .repo-list-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: var(--app-card);
            border-bottom: 1px solid var(--app-separator);
            cursor: pointer;
            gap: 14px;
            transition: all 0.2s ease;
        }
        .repo-list-item:hover { 
            background: rgba(255, 255, 255, 0.02); 
        }
        .repo-list-item:active { 
            background: rgba(255, 255, 255, 0.04); 
        }
        .repo-list-item .repo-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--app-blue), var(--app-purple));
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 22px;
            flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0, 229, 255, 0.15);
        }
        .repo-list-item .repo-icon.all { background: linear-gradient(135deg, #5856D6, #AF52DE); }
        .repo-list-item .repo-info { flex: 1; min-width: 0; }
        .repo-list-item .repo-name {
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.3px;
        }
        .repo-list-item .repo-url {
            font-size: 13px;
            color: var(--app-gray);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .repo-list-item .repo-count {
            font-size: 13px;
            color: var(--app-gray);
            flex-shrink: 0;
        }

        /* ── Loading ── */
        .loading-view {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            color: var(--app-gray);
        }
        .loading-view .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--app-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-bottom: 12px;
        }
        .loading-view .progress-container {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .loading-view .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--app-blue), var(--app-purple));
            border-radius: 2px;
            transition: width 0.2s ease;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Error View ── */
        .error-view {
            text-align: center;
            padding: 60px 20px;
            color: #FF3B30;
        }
        .error-view i { font-size: 44px; margin-bottom: 8px; }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--app-gray);
        }
        .empty-state i { font-size: 56px; margin-bottom: 12px; opacity: 0.2; }
        .empty-state p { font-size: 17px; }

        /* ── Pagination ── */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            gap: 8px;
            background: transparent;
        }
        .pagination-btn {
            background: var(--app-card);
            color: var(--app-blue);
            border: 1px solid var(--app-separator);
            border-radius: 12px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pagination-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.02);
            border-color: var(--app-blue);
        }
        .pagination-btn:active:not(:disabled) {
            background: rgba(255, 255, 255, 0.05);
            transform: scale(0.95);
        }
        .pagination-btn:disabled {
            color: rgba(255, 255, 255, 0.2);
            border-color: var(--app-separator);
            opacity: 0.5;
            cursor: not-allowed;
        }
        .pagination-info {
            font-size: 14px;
            font-weight: 600;
            color: #FFFFFF;
            padding: 0 8px;
        }

        /* ── Hide Adsterra Font Errors ── */
        body > div[id^="container-"], 
        body > iframe, 
        body > div:not(.sticky-header-container):not(.page):not(.tab-bar):not(.modal):not(.offcanvas):not(.install-modal-overlay) {
            font-size: 0 !important;
            color: transparent !important;
            line-height: 0 !important;
        }
        body > div[id^="container-"] *, 
        body > div:not(.sticky-header-container):not(.page):not(.tab-bar):not(.modal):not(.offcanvas):not(.install-modal-overlay) * {
            font-size: 0 !important;
            color: transparent !important;
            line-height: 0 !important;
        }
        /* Allow iframes and images inside them to display normally */
        body > div[id^="container-"] iframe,
        body > div[id^="container-"] img,
        body > div:not(.sticky-header-container):not(.page):not(.tab-bar):not(.modal):not(.offcanvas) iframe,
        body > div:not(.sticky-header-container):not(.page):not(.tab-bar):not(.modal):not(.offcanvas) img {
            display: block !important;
        }

        /* ── Install Modal (Action Sheet) ── */
        .install-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10000;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        .install-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .install-modal {
            width: 100%;
            max-width: 500px;
            background: var(--app-card);
            border-radius: 20px 20px 0 0;
            padding: 8px 0 var(--safe-bottom);
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .install-modal-overlay.active .install-modal {
            transform: translateY(0);
        }
        .install-modal-handle {
            width: 36px;
            height: 5px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin: 8px auto 12px;
        }
        .install-modal-title {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--app-gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .install-modal-app-name {
            text-align: center;
            font-size: 18px;
            font-weight: 800;
            color: #FFFFFF;
            padding: 0 20px 12px;
            border-bottom: 1px solid var(--app-separator);
            margin-bottom: 4px;
            word-break: break-word;
        }
        .install-option {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            cursor: pointer;
            transition: background 0.15s;
            gap: 14px;
            border: none;
            background: none;
            width: 100%;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 600;
        }
        .install-option:active {
            background: rgba(255, 255, 255, 0.05);
        }
        .install-option-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        .install-option-icon.download {
            background: linear-gradient(135deg, var(--app-blue), var(--app-purple));
        }
        .install-option-icon.esign {
            background: linear-gradient(135deg, #007AFF, #5856D6);
        }
        .install-option-icon.feather {
            background: linear-gradient(135deg, #34C759, #30D158);
        }
        .install-option-icon.ksign {
            background: linear-gradient(135deg, #FF9500, #FF6B00);
        }
        .install-option .option-text {
            flex: 1;
        }
        .install-option .option-label {
            font-size: 16px;
            font-weight: 700;
        }
        .install-option .option-sub {
            font-size: 12px;
            color: var(--app-gray);
            margin-top: 2px;
        }
        .install-option .option-arrow {
            color: var(--app-gray);
            font-size: 16px;
        }
        .install-modal-cancel {
            display: block;
            width: calc(100% - 16px);
            margin: 8px 8px 0;
            padding: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--app-separator);
            border-radius: 14px;
            color: #FF3B30;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            text-align: center;
        }
        .install-modal-cancel:active {
            background: rgba(255, 59, 48, 0.15);
        }

        /* ── Repo Add Source Button ── */
        .repo-list-item .add-source-btn {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(0, 229, 255, 0.1);
            border: 1px solid rgba(0, 229, 255, 0.2);
            color: var(--app-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 16px;
            transition: all 0.2s;
            margin-left: 4px;
        }
        .repo-list-item .add-source-btn:hover {
            background: var(--app-blue);
            color: #000;
        }
        .repo-list-item .add-source-btn:active {
            transform: scale(0.9);
        }

        /* ── Add Source Modal ── */
        .addsource-option {
            display: flex;
            align-items: center;
            padding: 13px 20px;
            cursor: pointer;
            transition: background 0.15s;
            gap: 12px;
            border: none;
            background: none;
            width: 100%;
            color: #FFFFFF;
            font-size: 15px;
            font-weight: 600;
        }
        .addsource-option:active {
            background: rgba(255, 255, 255, 0.05);
        }
        .addsource-option .addsource-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            color: #fff;
        }
    </style>
</head>
<body>

    <!-- Sticky Header Container -->
    <div class="sticky-header-container">
        <!-- Header -->
        <div class="app-header" id="appHeader">
            <h1 id="headerTitle">IPA Store</h1>
            <div class="subtitle" id="headerSubtitle"></div>
        </div>

        <!-- Search Bar -->
        <div class="search-bar">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="searchInput" placeholder="Tìm kiếm ứng dụng...">
        </div>

        <!-- Category Filter Bar (Horizontal Scroll) -->
        <div class="category-filter-bar" id="categoryFilterBar">
            <button type="button" class="category-filter-item active" data-category="all">Tất cả</button>
            <button type="button" class="category-filter-item" data-category="game">🎮 Trò chơi</button>
            <button type="button" class="category-filter-item" data-category="video">🎬 Video & Phim</button>
            <button type="button" class="category-filter-item" data-category="social">💬 Mạng xã hội</button>
            <button type="button" class="category-filter-item" data-category="photo">📸 Ảnh & Video</button>
            <button type="button" class="category-filter-item" data-category="utility">🛠 Tiện ích</button>
            <button type="button" class="category-filter-item" data-category="productivity">💼 Năng suất</button>
            <button type="button" class="category-filter-item" data-category="music">🎵 Nhạc</button>
            <button type="button" class="category-filter-item" data-category="other">📦 Khác</button>
        </div>
        <!-- Quick Add Source Buttons -->
        <div class="quick-add-source">
            <a href="javascript:void(0)" onclick="window._quickAddSource('esign')" class="quick-add-btn esign">
                <i class="bi bi-pen-fill"></i> ESign
            </a>
            <a href="javascript:void(0)" onclick="window._quickAddSource('ksign')" class="quick-add-btn ksign">
                <i class="bi bi-pencil-square"></i> KSign
            </a>
            <a href="javascript:void(0)" onclick="window._quickAddSource('gbox')" class="quick-add-btn gbox">
                <i class="bi bi-box-seam-fill"></i> GBox
            </a>
            <a href="javascript:void(0)" onclick="window._quickAddSource('feather')" class="quick-add-btn feather">
                <i class="bi bi-feather"></i> Feather
            </a>
            <button class="quick-add-btn copy" onclick="window._copyRepoUrl()" style="background: linear-gradient(135deg, #8E8E93, #636366);">
                <i class="bi bi-clipboard"></i> Sao chép
            </button>
        </div>
    </div>

    <!-- ==================== APPS PAGE ==================== -->
    <div class="page active" id="appsPage">
        <div id="appsSectionTitle" class="section-title d-none"></div>
        <div class="loading-view" id="loading">
            <div class="spinner"></div>
            <span id="loadingText">Đang tải...</span>
            <div class="progress-container" id="progressContainer" style="display:none">
                <div class="progress-bar" id="progressBar"></div>
            </div>
        </div>
        <div class="error-view d-none" id="error-message"></div>
        <div class="empty-state d-none" id="emptyState">
            <i class="bi bi-app"></i>
            <p>Không tìm thấy ứng dụng nào</p>
        </div>
        <div id="appList"></div>
        <div class="pagination-container d-none" id="paginationContainer">
            <button class="pagination-btn" id="paginationFirst" disabled>««</button>
            <button class="pagination-btn" id="paginationPrev" disabled>«</button>
            <span class="pagination-info" id="paginationInfo">Trang 1 / 1</span>
            <button class="pagination-btn" id="paginationNext" disabled>»</button>
            <button class="pagination-btn" id="paginationLast" disabled>»»</button>
        </div>
    </div>

    <!-- ==================== REPOS PAGE ==================== -->
    <div class="page" id="reposPage">
        <div class="section-title">Repositories</div>
        <div id="repoList"></div>
    </div>

    <!-- ==================== INSTALL ACTION SHEET MODAL ==================== -->
    <div class="install-modal-overlay" id="installModal">
        <div class="install-modal">
            <div class="install-modal-handle"></div>
            <div class="install-modal-title">CÀI ĐẶT QUA</div>
            <div class="install-modal-app-name" id="installModalAppName"></div>
            <button class="install-option" onclick="window._installAction('esign')">
                <div class="install-option-icon esign"><i class="bi bi-pen-fill"></i></div>
                <div class="option-text">
                    <div class="option-label">Cài qua ESign</div>
                    <div class="option-sub">Ký & cài đặt bằng ESign</div>
                </div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="install-option" onclick="window._installAction('feather')">
                <div class="install-option-icon feather"><i class="bi bi-feather"></i></div>
                <div class="option-text">
                    <div class="option-label">Cài qua Feather</div>
                    <div class="option-sub">Ký & cài đặt bằng Feather</div>
                </div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="install-option" onclick="window._installAction('ksign')">
                <div class="install-option-icon ksign"><i class="bi bi-pencil-square"></i></div>
                <div class="option-text">
                    <div class="option-label">Cài qua KSign</div>
                    <div class="option-sub">Ký & cài đặt bằng KSign</div>
                </div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="install-option" onclick="window._installAction('direct')">
                <div class="install-option-icon" style="background: linear-gradient(135deg, #8E8E93, #636366);"><i class="bi bi-download"></i></div>
                <div class="option-text">
                    <div class="option-label">Tải trực tiếp IPA</div>
                    <div class="option-sub">Tải file .ipa về máy</div>
                </div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="install-modal-cancel" onclick="window._closeInstallModal()">Hủy</button>
        </div>
    </div>

    <!-- ==================== ADD SOURCE ACTION SHEET MODAL ==================== -->
    <div class="install-modal-overlay" id="addSourceModal">
        <div class="install-modal">
            <div class="install-modal-handle"></div>
            <div class="install-modal-title">THÊM NGUỒN VÀO</div>
            <div class="install-modal-app-name" id="addSourceModalUrl" style="font-size:13px; font-weight:400; color:var(--app-gray);"></div>
            <button class="addsource-option" onclick="window._addSourceAction('esign')">
                <div class="addsource-icon" style="background:linear-gradient(135deg,#007AFF,#5856D6)"><i class="bi bi-pen-fill"></i></div>
                <div class="option-label">Thêm vào ESign</div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="addsource-option" onclick="window._addSourceAction('feather')">
                <div class="addsource-icon" style="background:linear-gradient(135deg,#34C759,#30D158)"><i class="bi bi-feather"></i></div>
                <div class="option-label">Thêm vào Feather</div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="addsource-option" onclick="window._addSourceAction('ksign')">
                <div class="addsource-icon" style="background:linear-gradient(135deg,#FF9500,#FF6B00)"><i class="bi bi-pencil-square"></i></div>
                <div class="option-label">Thêm vào KSign</div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="addsource-option" onclick="window._addSourceAction('gbox')">
                <div class="addsource-icon" style="background:linear-gradient(135deg,#AF52DE,#BF5AF2)"><i class="bi bi-box-seam-fill"></i></div>
                <div class="option-label">Thêm vào GBox</div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="addsource-option" onclick="window._addSourceAction('copy')">
                <div class="addsource-icon" style="background:linear-gradient(135deg,#8E8E93,#636366)"><i class="bi bi-clipboard"></i></div>
                <div class="option-label">Sao chép URL nguồn</div>
                <i class="bi bi-chevron-right option-arrow"></i>
            </button>
            <button class="install-modal-cancel" onclick="window._closeAddSourceModal()">Hủy</button>
        </div>
    </div>

    <!-- Adsterra Scripts -->
    <script src="https://suspectedmilitary.com/22/3f/33/223f33409ab92609d559bb5cb31b712a.js"></script>
    <script src="https://suspectedmilitary.com/e6/57/d9/e657d9b9b01bd8f4732ca3c0a16f9198.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
