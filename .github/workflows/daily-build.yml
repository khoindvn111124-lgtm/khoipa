name: Daily Build

on:
  schedule:
    - cron: '0 0 * * *'    # Chạy lúc 0:00 UTC mỗi ngày
    - cron: '0 12 * * *'   # Chạy lúc 12:00 UTC mỗi ngày
  workflow_dispatch:         # Cho phép bấm chạy thủ công trên GitHub

permissions:
  contents: write            # Cần để push commit

jobs:
  trigger-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Trigger rebuild via empty commit
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git commit --allow-empty -m "chore: auto rebuild to update repos"
          git push
