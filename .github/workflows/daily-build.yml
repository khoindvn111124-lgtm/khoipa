name: Build repo.json

on:
  push:
    paths:
      - 'khoipa.txt'
      - 'merge-repos.js'
      - '.github/workflows/daily-build.yml'
  schedule:
    - cron: '0 0 * * *'    # Chạy lúc 0:00 UTC mỗi ngày (7:00 AM giờ VN)
  repository_dispatch:
    types: [trigger-build]   # Nhận lệnh từ Cloudflare Worker
  workflow_dispatch:         # Cho phép bấm chạy thủ công trên GitHub

permissions:
  contents: write            # Cần để push commit

jobs:
  build-repo-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build repo.json
        run: npm run build

      - name: Commit and push repo.json
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add repo.json dist/repo.json
          git diff --staged --quiet || git commit -m "chore: auto update repo.json ($(date +'%Y-%m-%d'))"
          git pull --rebase --autostash origin main
          git push
